<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://maps.googleapis.com/maps/api/AIzaSyCocE02RAn1-EUx1jYy2kAGjVKpGLKpjMk"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BizFinder + Cold Email AI</title>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#06b6d4',
          }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Inter', system-ui, sans-serif; }
    #map { width: 100%; height: 100%; }
    .leaflet-container { background: #1a1a2e; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
    .biz-card:hover { transform: translateY(-1px); }
    .biz-card { transition: transform 0.15s ease; }
    #autocomplete-list { max-height: 240px; overflow-y: auto; }
    .spinner { border: 2px solid #333; border-top: 2px solid #06b6d4; border-radius: 50%; width: 16px; height: 16px; animation: spin 0.7s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 9999px; font-size: 11px; background: #06b6d480; color: #fff; margin-right: 4px; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: flex; align-items: center; justify-content: center; }
    .modal-box { background: #1e1e2e; border: 1px solid #333; border-radius: 14px; padding: 28px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; }
    .btn { cursor: pointer; padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; border: none; transition: all 0.15s; }
    .btn-primary { background: #06b6d4; color: #fff; }
    .btn-primary:hover { background: #0891b2; }
    .btn-outline { background: transparent; color: #06b6d4; border: 1px solid #06b6d4; }
    .btn-outline:hover { background: #06b6d420; }
    .btn-danger { background: #ef4444; color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    .input-field { background: #111827; border: 1px solid #374151; color: #e5e7eb; border-radius: 8px; padding: 8px 12px; font-size: 13px; outline: none; width: 100%; }
    .input-field:focus { border-color: #06b6d4; }
    .sidebar { width: 360px; min-width: 360px; background: #0f0f1a; border-right: 1px solid #1f2937; display: flex; flex-direction: column; height: calc(100vh - 56px); overflow: hidden; }

      .sidebar { position: fixed; left: 0; top: 56px; z-index: 100; transform: translateX(-100%); transition: transform 0.2s; height: calc(100vh - 56px); }

    .star { color: #facc15; }
    .copy-btn { cursor: pointer; font-size: 11px; color: #06b6d4; }
    .copy-btn:hover { text-decoration: underline; }
  </style>
</head>

<script>
// ─── STATE ───────────────────────────────────────────
let map, radiusCircle, markers = [];
let businesses = [];
let selectedIds = new Set();
let currentRadius = 2000;
let mapCenter = null;
let isSearching = false;
let autoCompleteTimeout = null;

// ─── INIT MAP ─────────────────────────────────────────
function initMap() {
  map = L.map('map', { zoomControl: true }).setView([20.5937, 78.9629], 5);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '©OpenStreetMap ©CartoDB', maxZoom: 19
  }).addTo(map);

  map.on('click', async (e) => {
    setMapCenter(e.latlng.lat, e.latlng.lng);
    const name = await reverseGeocode(e.latlng.lat, e.latlng.lng);
    document.getElementById('locationInput').value = name;
    updateLocationBox(name, '', 0);
  });
}

function setMapCenter(lat, lng, zoom) {
  mapCenter = { lat, lng };
  map.setView([lat, lng], zoom || map.getZoom());
  drawRadius(lat, lng, currentRadius);
}

function drawRadius(lat, lng, r) {
  if (radiusCircle) map.removeLayer(radiusCircle);
  radiusCircle = L.circle([lat, lng], {
    radius: r, color: '#06b6d4', fillColor: '#06b6d420', fillOpacity: 0.15, weight: 1.5
  }).addTo(map);
}

// ─── LOCATION SEARCH ─────────────────────────────────
function onLocationInput(val) {
  clearTimeout(autoCompleteTimeout);
  if (val.length < 2) { hideAutocomplete(); return; }
  autoCompleteTimeout = setTimeout(() => fetchAutocomplete(val), 350);
}

async function fetchAutocomplete(q) {
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=7&addressdetails=1&accept-language=en`, {headers:{'Accept-Language':'en'}});
    const data = await res.json();
    showAutocomplete(data);
  } catch(e) {}
}

function showAutocomplete(items) {
  const list = document.getElementById('autocomplete-list');
  if (!items.length) { list.classList.add('hidden'); return; }
  list.innerHTML = items.map((item, i) => `
    <button onclick="selectLocation(${parseFloat(item.lat)}, ${parseFloat(item.lon)}, \`${item.display_name.replace(/`/g,"'")}\`)"
      class="w-full text-left px-3 py-2 text-sm text-gray-200 hover:bg-gray-700 flex items-start gap-2 border-b border-gray-700/50 last:border-0">
      <svg class="mt-0.5 shrink-0" width="12" height="12" fill="none" stroke="#06b6d4" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <span class="truncate">${item.display_name}</span>
    </button>
  `).join('');
  list.classList.remove('hidden');
}

function hideAutocomplete() {
  document.getElementById('autocomplete-list').classList.add('hidden');
}

function selectLocation(lat, lng, name) {
  hideAutocomplete();
  document.getElementById('locationInput').value = name.split(',')[0];
  setMapCenter(lat, lng, 14);
  updateLocationBox(name.split(',')[0], name.split(',').slice(1,3).join(',').trim(), 0);
}

async function useMyLocation() {
  if (!navigator.geolocation) return alert('Geolocation not supported');
  navigator.geolocation.getCurrentPosition(async pos => {
    const { latitude: lat, longitude: lng } = pos.coords;
    setMapCenter(lat, lng, 14);
    const name = await reverseGeocode(lat, lng);
    document.getElementById('locationInput').value = name;
    updateLocationBox(name, '', 0);
  }, () => alert('Could not get location'));
}

async function reverseGeocode(lat, lng) {
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`, {headers:{'Accept-Language':'en'}});
    const d = await res.json();
    return d.address?.city || d.address?.town || d.address?.village || d.display_name?.split(',')[0] || 'Unknown';
  } catch { return 'Unknown'; }
}

// ─── RADIUS ───────────────────────────────────────────
function setRadius(r) {
  currentRadius = r;
  document.querySelectorAll('.radius-btn').forEach(b => {
    b.classList.remove('btn-primary','active-radius');
    b.classList.add('btn-outline');
  });
  const active = document.querySelector(`.radius-btn[data-r="${r}"]`);
  if (active) { active.classList.remove('btn-outline'); active.classList.add('btn-primary','active-radius'); }
  if (mapCenter) drawRadius(mapCenter.lat, mapCenter.lng, r);
}

// ─── SEARCH ───────────────────────────────────────────
// ─── UPDATED DO-SEARCH FUNCTION ───────────────────────
async function doSearch() {
  const keyword = document.getElementById('searchInput').value.trim();
  if (!keyword) return alert('Please enter a business type to search');
  if (!mapCenter) return alert('Please select a location first');

  isSearching = true;
  businesses = [];
  selectedIds.clear();
  clearMarkers();
  updateStats();
  updateBizList();

  const searchBtn = document.getElementById('searchBtn');
  searchBtn.innerHTML = '<span class="spinner"></span>';
  searchBtn.disabled = true;
  showStatus('🔍 Searching businesses...');

  try {
    // AB YE DIRECT LIBRARY CALL KAREGA (FETCH ERROR NAHI AAYEGA)
    businesses = await searchWithGoogle(keyword);
    
    const locName = document.getElementById('locationInput').value || 'area';
    businesses = businesses.map(b => ({ ...b, city: locName, search_query: keyword }));

    if (businesses.length) {
      showStatus(`✅ ${businesses.length} businesses found`);
      setTimeout(hideStatus, 3000);
    } else {
      showStatus('⚠️ No businesses found.');
    }

    updateStats();
    updateBizList();
    plotMarkers();
    updateLocationBox(locName, '', businesses.length);
    document.getElementById('exportBtn').disabled = businesses.length === 0;

  } catch(e) {
    console.error(e);
    alert('Search failed: ' + e.message);
    hideStatus();
  } finally {
    isSearching = false;
    searchBtn.innerHTML = '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>';
    searchBtn.disabled = false;
  }
}
// ─── NAYA GOOGLE SEARCH FUNCTION (NO FETCH) ──────────
async function searchWithGoogle(keyword) {
  return new Promise((resolve, reject) => {
    // Ye line direct browser se Google ko connect karegi bina kisi error ke
    const service = new google.maps.places.PlacesService(document.createElement('div'));
    
    const request = {
      location: new google.maps.LatLng(mapCenter.lat, mapCenter.lng),
      radius: currentRadius,
      keyword: keyword
    };

    service.nearbySearch(request, (results, status) => {
      if (status === google.maps.places.PlacesServiceStatus.OK) {
        resolve(results.map(p => ({
          name: p.name,
          address: p.vicinity || '',
          category: (p.types?.[0] || keyword).replace(/_/g,' '),
          rating: p.rating || null,
          location_lat: p.geometry.location.lat(),
          location_lng: p.geometry.location.lng(),
        })));
      } else {
        reject(new Error('Google search failed: ' + status));
      }
    });
  });
}
async function searchWithOverpass(keyword) {
  const r = currentRadius;
  const lat = mapCenter.lat, lng = mapCenter.lng;
  const tagMap = {
    restaurant: 'amenity=restaurant', cafe: 'amenity=cafe', hotel: 'tourism=hotel',
    hospital: 'amenity=hospital', pharmacy: 'amenity=pharmacy', bank: 'amenity=bank',
    gym: 'leisure=fitness_centre', shop: 'shop=*', salon: 'shop=hairdresser',
    skin: 'shop=beauty', clinic: 'amenity=clinic', school: 'amenity=school',
    supermarket: 'shop=supermarket', bakery: 'shop=bakery', bar: 'amenity=bar',
    dental: 'amenity=dentist', doctor: 'amenity=doctors', spa: 'leisure=spa',
  };
  const kw = keyword.toLowerCase();
  let tag = null;
  for (const [k, v] of Object.entries(tagMap)) {
    if (kw.includes(k)) { tag = v; break; }
  }
  if (!tag) return [];

  const [key, val] = tag.split('=');
  const query = val === '*'
    ? `[out:json][timeout:25];(node["${key}"](around:${r},${lat},${lng});way["${key}"](around:${r},${lat},${lng}););out center 40;`
    : `[out:json][timeout:25];(node["${key}"="${val}"](around:${r},${lat},${lng});way["${key}"="${val}"](around:${r},${lat},${lng}););out center 40;`;

  const res = await fetch('https://overpass-api.de/api/interpreter', { method:'POST', body:'data='+encodeURIComponent(query) });
  const data = await res.json();
  return (data.elements || []).filter(e => e.tags?.name).map(e => ({
    name: e.tags.name,
    address: [e.tags['addr:street'], e.tags['addr:city']].filter(Boolean).join(', ') || '',
    category: keyword,
    rating: null,
    phone: e.tags.phone || e.tags['contact:phone'] || '',
    website: e.tags.website || e.tags['contact:website'] || '',
    email: e.tags.email || e.tags['contact:email'] || '',
    location_lat: e.lat || e.center?.lat || null,
    location_lng: e.lon || e.center?.lon || null,
  }));
}

async function searchWithNominatim(keyword) {
  const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(keyword)}&lat=${mapCenter.lat}&lon=${mapCenter.lng}&radius=${currentRadius/1000}&format=json&limit=30&addressdetails=1&accept-language=en`;
  const res = await fetch(url, {headers:{'Accept-Language':'en'}});
  const data = await res.json();
  return data.filter(d => d.display_name).map(d => ({
    name: d.name || d.display_name.split(',')[0],
    address: d.display_name.split(',').slice(1,4).join(',').trim(),
    category: keyword,
    rating: null, phone: '', website: '', email: '',
    location_lat: parseFloat(d.lat),
    location_lng: parseFloat(d.lon),
  }));
}

// ─── MAP MARKERS ──────────────────────────────────────
function plotMarkers() {
  clearMarkers();
  businesses.forEach((biz, i) => {
    if (!biz.location_lat || !biz.location_lng) return;
    const icon = L.divIcon({
      html: `<div style="background:#06b6d4;color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;border:2px solid #fff;cursor:pointer;">${i+1}</div>`,
      iconSize: [28,28], className: ''
    });
    const m = L.marker([biz.location_lat, biz.location_lng], {icon}).addTo(map);
    m.bindPopup(`<b>${biz.name}</b><br>${biz.address || ''}<br>${biz.phone ? '📞 '+biz.phone : ''}<br>${biz.email ? '✉️ '+biz.email : ''}`);
    markers.push(m);
  });
}

function clearMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
}

// ─── BUSINESS LIST ────────────────────────────────────
function updateBizList() {
  const container = document.getElementById('bizList');
  if (!businesses.length) {
    container.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-gray-600 gap-3">
      <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <p class="text-sm">Search for businesses to get started</p></div>`;
    document.getElementById('selectAllBar').classList.add('hidden');
    return;
  }

  document.getElementById('selectAllBar').classList.remove('hidden');
  container.innerHTML = businesses.map((biz, i) => `
    <div class="biz-card bg-gray-800 border border-gray-700 rounded-xl p-3 mb-2 cursor-pointer ${selectedIds.has(i) ? 'border-cyan-500 bg-gray-700' : ''}" onclick="toggleSelect(${i})" id="card-${i}">
      <div class="flex items-start gap-2">
        <div class="mt-0.5 w-4 h-4 rounded border ${selectedIds.has(i) ? 'bg-cyan-500 border-cyan-500' : 'border-gray-500'} flex items-center justify-center shrink-0">
          ${selectedIds.has(i) ? '<svg width="10" height="10" fill="none" stroke="white" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
        </div>
        <div class="flex-1 min-w-0">
          <div class="font-semibold text-sm text-white truncate">${biz.name}</div>
          ${biz.category ? `<span class="tag">${biz.category}</span>` : ''}
          ${biz.rating ? `<span class="star text-xs">★ ${biz.rating}</span>` : ''}
          ${biz.address ? `<div class="text-xs text-gray-400 truncate mt-1">📍 ${biz.address}</div>` : ''}
          ${biz.phone ? `<div class="text-xs text-gray-400 mt-0.5">📞 ${biz.phone}</div>` : ''}
          ${biz.email ? `<div class="text-xs text-cyan-400 mt-0.5 truncate">✉️ ${biz.email}</div>` : ''}
          ${biz.website ? `<div class="text-xs text-blue-400 mt-0.5 truncate"><a href="${biz.website}" target="_blank" onclick="event.stopPropagation()">🌐 Website</a></div>` : ''}
        </div>
      </div>
    </div>
  `).join('');
}

function toggleSelect(i) {
  if (selectedIds.has(i)) selectedIds.delete(i);
  else selectedIds.add(i);
  updateStats();
  updateBizList();
  const emailBtn = document.getElementById('emailBtn');
  if (selectedIds.size > 0) {
    emailBtn.classList.remove('hidden');
    document.getElementById('emailBtnText').textContent = `Generate Emails (${selectedIds.size})`;
  } else {
    emailBtn.classList.add('hidden');
  }
}

function toggleSelectAll() {
  if (selectedIds.size === businesses.length) {
    selectedIds.clear();
  } else {
    businesses.forEach((_, i) => selectedIds.add(i));
  }
  updateStats();
  updateBizList();
  const emailBtn = document.getElementById('emailBtn');
  if (selectedIds.size > 0) {
    emailBtn.classList.remove('hidden');
    document.getElementById('emailBtnText').textContent = `Generate Emails (${selectedIds.size})`;
  } else {
    emailBtn.classList.add('hidden');
  }
}

// ─── STATS ────────────────────────────────────────────
function updateStats() {
  document.getElementById('statFound').textContent = businesses.length;
  document.getElementById('statEmails').textContent = businesses.filter(b => b.email).length;
  document.getElementById('statSelected').textContent = selectedIds.size;
}

// ─── STATUS BAR ───────────────────────────────────────
function showStatus(msg) {
  const bar = document.getElementById('statusBar');
  bar.innerHTML = `<span class="spinner"></span> <span style="margin-left:6px">${msg}</span>`;
  bar.classList.remove('hidden');
}
function hideStatus() {
  document.getElementById('statusBar').classList.add('hidden');
}

// ─── LOCATION BOX ─────────────────────────────────────
function updateLocationBox(name, sub, count) {
  document.getElementById('locationInfoBox').classList.remove('hidden');
  document.getElementById('locationInfoName').textContent = name;
  document.getElementById('locationInfoSub').textContent = sub || '';
  document.getElementById('locationInfoCount').textContent = count ? `${count} businesses found` : '';
}

// ─── EXPORT CSV ───────────────────────────────────────
function exportCSV() {
  if (!businesses.length) return;
  const rows = [
    ['Business Name','Category','Address','Phone','Email','Website','Rating','City'],
    ...businesses.map(b => [b.name||'',b.category||'',b.address||'',b.phone||'',b.email||'',b.website||'',b.rating||'',b.city||''])
  ];
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `bizfinder-leads-${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

// ─── EMAIL MODAL ──────────────────────────────────────
function openEmailModal() {
  document.getElementById('emailModal').classList.remove('hidden');
  document.getElementById('emailResults').innerHTML = '';
  const saved = localStorage.getItem('geminiKey');
  if (saved) document.getElementById('geminiKey').value = saved;
}
function closeEmailModal() {
  document.getElementById('emailModal').classList.add('hidden');
}

async function generateEmails() {
  const product = document.getElementById('senderProduct').value.trim();
  const sender = document.getElementById('senderName').value.trim();
  const tone = document.getElementById('emailTone').value;
  const apiKey = document.getElementById('geminiKey').value.trim();

  if (!product || !sender) return alert('Please fill in your product and name');
  if (!apiKey) return alert('Please enter your Gemini API key');

  const selected = [...selectedIds].map(i => businesses[i]).filter(Boolean);
  if (!selected.length) return alert('No businesses selected');

  const btn = document.getElementById('genEmailBtn');
  btn.innerHTML = '<span class="spinner"></span> Generating...';
  btn.disabled = true;

  const resultsDiv = document.getElementById('emailResults');
  resultsDiv.innerHTML = '';

  for (const biz of selected) {
    try {
      const prompt = `Write a ${tone} cold outreach email from "${sender}" offering "${product}" to the business "${biz.name}" (${biz.category || 'business'}) located at ${biz.city || 'their location'}.
Keep it concise (under 120 words), personalized, and end with a clear CTA.
Return JSON: {"subject": "...", "body": "..."}`;

      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);

      const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
      const match = text.match(/\{[\s\S]*\}/);
      const parsed = match ? JSON.parse(match[0]) : { subject: 'Hello from '+sender, body: text };

      resultsDiv.innerHTML += `
        <div class="bg-gray-900 border border-gray-700 rounded-xl p-4 space-y-2">
          <div class="font-semibold text-cyan-400 text-sm">${biz.name} ${biz.email ? `<span class="text-gray-400 font-normal">(${biz.email})</span>` : ''}</div>
          <div class="text-xs text-gray-400">Subject: <span class="text-white font-medium">${parsed.subject}</span>
            <span class="copy-btn ml-2" onclick="copyText('${parsed.subject.replace(/'/g,"\\'")}')">copy</span>
          </div>
          <div class="text-xs text-gray-300 whitespace-pre-wrap bg-gray-800 rounded-lg p-3">${parsed.body}</div>
          <button onclick="copyText(\`${parsed.body.replace(/`/g,"\\`")}\`)" class="copy-btn text-xs">📋 Copy Email Body</button>
        </div>`;
    } catch(e) {
      resultsDiv.innerHTML += `<div class="text-xs text-red-400 bg-red-900/20 border border-red-800/40 rounded-lg px-3 py-2">${biz.name}: ${e.message}</div>`;
    }
  }

  btn.innerHTML = '⚡ Generate Cold Emails for Selected Businesses';
  btn.disabled = false;
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => {
    const el = document.createElement('div');
    el.textContent = '✅ Copied!';
    el.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#06b6d4;color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;z-index:9999';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  });
}

function saveApiKey(v) { localStorage.setItem('gmapsKey', v); }

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// Close autocomplete on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('#locationInput') && !e.target.closest('#autocomplete-list')) hideAutocomplete();
});

// Close modal on overlay click
document.getElementById('emailModal').addEventListener('click', e => {
  if (e.target === document.getElementById('emailModal')) closeEmailModal();
});

// Restore saved API keys
window.addEventListener('load', () => {
  const saved = localStorage.getItem('gmapsKey');
  if (saved) document.getElementById('apiKeyInput').value = saved;
  initMap();
});
</script>
